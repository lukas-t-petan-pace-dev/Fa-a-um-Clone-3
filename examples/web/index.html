<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat com Agente de IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .chat-header .status {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .status.connected {
            color: #4ade80;
        }
        
        .status.disconnected {
            color: #f87171;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 2px;
        }
        
        .message.agent .message-content {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .message.thinking .message-content {
            background: #f1f5f9;
            color: #64748b;
            font-style: italic;
        }
        
        .message-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #667eea;
        }
        
        .chat-input button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .tools-info {
            padding: 10px 20px;
            background: #f0f9ff;
            border-bottom: 1px solid #e0f2fe;
            font-size: 0.85rem;
            color: #0369a1;
        }
        
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1 id="agent-name">Agente de IA</h1>
            <div class="status disconnected" id="status">Desconectado</div>
        </div>
        
        <div class="tools-info" id="tools-info">
            Carregando ferramentas...
        </div>
        
        <div class="chat-messages" id="messages">
            <div class="message agent">
                <div class="message-content">
                    Olá! Como posso ajudá-lo hoje?
                </div>
            </div>
        </div>
        
        <div class="chat-input">
            <input 
                type="text" 
                id="message-input" 
                placeholder="Digite sua mensagem..."
                autocomplete="off"
            >
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const wsUrl = `ws://${window.location.hostname || 'localhost'}:8765`;
        let ws = null;
        let isConnected = false;
        
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages');
        const statusElement = document.getElementById('status');
        const agentNameElement = document.getElementById('agent-name');
        const toolsInfoElement = document.getElementById('tools-info');
        
        function connect() {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                isConnected = true;
                statusElement.textContent = 'Conectado';
                statusElement.className = 'status connected';
                sendBtn.disabled = false;
                console.log('Conectado ao WebSocket');
            };
            
            ws.onclose = () => {
                isConnected = false;
                statusElement.textContent = 'Desconectado';
                statusElement.className = 'status disconnected';
                sendBtn.disabled = true;
                console.log('Desconectado do WebSocket');
                
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('Erro no WebSocket:', error);
            };
            
            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    handleMessage(message);
                } catch (e) {
                    console.error('Erro ao processar mensagem:', e);
                }
            };
        }
        
        function handleMessage(message) {
            switch (message.type) {
                case 'connected':
                    agentNameElement.textContent = message.data.agent_name || 'Agente';
                    break;
                    
                case 'thinking':
                    showTyping();
                    break;
                    
                case 'response':
                    removeTyping();
                    addMessage(message.data.message, 'agent');
                    break;
                    
                case 'agent_info':
                    agentNameElement.textContent = message.data.name;
                    break;
                    
                case 'tools_list':
                    displayTools(message.data.tools);
                    break;
                    
                case 'error':
                    removeTyping();
                    addMessage(`Erro: ${message.data.message}`, 'agent');
                    break;
                    
                case 'memory_reset':
                    addMessage('Memória resetada', 'agent');
                    break;
            }
        }
        
        function displayTools(tools) {
            if (tools && tools.length > 0) {
                const toolNames = tools.map(t => t.name).join(', ');
                toolsInfoElement.textContent = `Ferramentas: ${toolNames}`;
            }
        }
        
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = sender === 'user' ? 'Você' : 'Agente';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(label);
            messageDiv.appendChild(content);
            messagesContainer.appendChild(messageDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function showTyping() {
            const existing = document.querySelector('.typing-indicator');
            if (existing) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message agent thinking';
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = 'Agente';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            
            messageDiv.appendChild(label);
            messageDiv.appendChild(content);
            messagesContainer.appendChild(messageDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function removeTyping() {
            const typing = document.querySelector('.message.thinking');
            if (typing) {
                typing.remove();
            }
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !isConnected) return;
            
            addMessage(text, 'user');
            messageInput.value = '';
            
            ws.send(JSON.stringify({
                type: 'chat',
                data: { message: text }
            }));
        }
        
        sendBtn.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        connect();
        
        setTimeout(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'get_info', data: {} }));
                ws.send(JSON.stringify({ type: 'get_tools', data: {} }));
            }
        }, 1000);
    </script>
</body>
</html>
